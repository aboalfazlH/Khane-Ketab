{% extends 'base/base.html' %}

{% block title %}
{% endblock title %}

{% block content %}
<style>
.parent {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 3vh;
}

.child {
    width: 300px;
    height: 300px;
    border: 2px solid black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.book {
    height: 70%;
}

img {
    width: 100%;
    height: 70%;
}

p {
    font-size: 20px;
    text-align: center;
}

.test {
    width: 100%;
}

button{
    margin-top: 40px;
    width: 100%;
    height: 50px;
}
</style>
<h1 style="text-align: center;position: relative;top:3.5vh">مسابقات کتاب خوانی</h1>
    <div class="parent">
    {% for race in races %}
        <div class="child">
            <div class="book">
            {% if race.thumbnail %}
                <img src="{{ race.thumbnail.url }}" alt="">
            {% endif %}
                <p>{{ race.title }}</p>
            </div>
            <div class="test">
                <a href="{% url 'quiz' %}?id={{ race.id }}">
                    <button>آزمون</button>
                </a>
            </div>
        </div>
    {% endfor %}
    </div>
{% endblock content %}
